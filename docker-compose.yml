# One-command local stack: MySQL + backend + frontend
# Usage:  docker compose up --build
# Frontend → http://localhost:5173   Backend → http://localhost:8081
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: insurance_db
    ports:
      - "3307:3306"          # host 3307 to avoid clashing with a local MySQL on 3306
    volumes:
      - ims_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/insurance_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      PORT: 8081
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8081/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ims_db_data:
