spring.application.name=insurance-management-system

# ---------- Server ----------
# 8081 because Apache httpd occupies 8080 on the development machine
server.port=8081

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_db?createDatabaseIfNotExist=true&serverTimezone=UTC
# Override with environment variables DB_USERNAME / DB_PASSWORD if needed
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:sasi}

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------- JWT ----------
# HMAC-SHA256 signing key (at least 32 characters). Change in production.
app.jwt.secret=ims-secret-key-change-me-in-production-0123456789
app.jwt.expiration-ms=86400000

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# ---------- Swagger / OpenAPI ----------
springdoc.swagger-ui.path=/swagger-ui.html
